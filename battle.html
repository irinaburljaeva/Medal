<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Битва шагов 👟</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --mint: #4ECDC4;
    --yellow: #FFE66D;
    --dark: #0f0f1a;
    --card: #16213e;
    --pink: #ec4899;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 10%, rgba(236,72,153,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(96,165,250,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 40%, rgba(255,107,107,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 8px;
  }

  .header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.15;
    background: linear-gradient(135deg, var(--pink), var(--yellow), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .header .subtitle {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ---- FIGHTER CARDS (selector) ---- */
  .fighters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .fighter-btn {
    position: relative;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.08);
    background: var(--card);
    cursor: pointer;
    overflow: hidden;
    transition: all 0.25s;
    padding: 0;
    text-align: center;
  }

  .fighter-btn:hover {
    transform: translateY(-3px);
  }

  .fighter-photo {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    object-position: center top;
    display: block;
    filter: grayscale(20%);
    transition: filter 0.3s;
  }

  .fighter-btn.active-p1 .fighter-photo,
  .fighter-btn.active-p2 .fighter-photo {
    filter: grayscale(0%) brightness(1.05);
  }

  .fighter-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 10px 12px;
    background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
  }

  .fighter-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: rgba(255,255,255,0.7);
    transition: color 0.2s;
  }

  .fighter-tag {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }

  .fighter-btn.active-p1 {
    border-color: #ec4899;
    box-shadow: 0 0 0 1px #ec4899, 0 0 24px rgba(236,72,153,0.3);
  }

  .fighter-btn.active-p1 .fighter-name { color: #ec4899; }
  .fighter-btn.active-p1 .fighter-tag { color: rgba(236,72,153,0.7); }

  .fighter-btn.active-p2 {
    border-color: #60a5fa;
    box-shadow: 0 0 0 1px #60a5fa, 0 0 24px rgba(96,165,250,0.3);
  }

  .fighter-btn.active-p2 .fighter-name { color: #60a5fa; }
  .fighter-btn.active-p2 .fighter-tag { color: rgba(96,165,250,0.7); }

  .active-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .fighter-btn.active-p1 .active-badge,
  .fighter-btn.active-p2 .active-badge {
    display: flex;
  }

  .fighter-btn.active-p1 .active-badge { background: #ec4899; }
  .fighter-btn.active-p2 .active-badge { background: #60a5fa; }

  /* ---- ADD CARD ---- */
  .add-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    transition: opacity 0.3s;
  }

  .add-card.locked {
    opacity: 0.35;
    pointer-events: none;
  }

  .add-card h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
  }

  .tab-btn {
    padding: 9px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: rgba(255,255,255,0.09);
    color: #fff;
  }

  .input-group {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .input-group.visible { display: flex; }

  .field-label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .quick-btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .quick-btn {
    padding: 8px 4px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.45);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    background: rgba(255,255,255,0.09);
    color: #fff;
  }

  .big-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .big-input::-webkit-outer-spin-button,
  .big-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .big-input:focus { border-color: rgba(255,255,255,0.25); }

  .note-input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    color: rgba(255,255,255,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .note-input::placeholder { color: rgba(255,255,255,0.2); }

  .duration-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
  }

  .dur-btn {
    padding: 10px 4px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.45);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .dur-btn.selected {
    border-color: var(--yellow);
    background: rgba(255,230,109,0.1);
    color: var(--yellow);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .submit-btn.p1 {
    background: linear-gradient(135deg, #ec4899, #f43f5e);
    color: #fff;
  }

  .submit-btn.p2 {
    background: linear-gradient(135deg, #60a5fa, #38bdf8);
    color: #0f0f1a;
  }

  .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .submit-btn:active { transform: translateY(0); }

  /* ---- BATTLE SCOREBOARD ---- */
  .battle-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .battle-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .battle-header h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .period-tabs {
    display: flex;
    gap: 4px;
  }

  .period-btn {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: rgba(255,255,255,0.3);
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .period-btn.active {
    background: rgba(255,255,255,0.09);
    color: #fff;
    border-color: rgba(255,255,255,0.15);
  }

  /* Fighter score row */
  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .score-photo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .score-row.p1 .score-photo { border-color: #ec4899; }
  .score-row.p2 .score-photo { border-color: #60a5fa; }

  .score-info { flex: 1; }

  .score-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }

  .score-row.p1 .score-name { color: #ec4899; }
  .score-row.p2 .score-name { color: #60a5fa; }

  .score-bar-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    border-radius: 100px;
    transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 4px;
  }

  .score-row.p1 .score-bar { background: linear-gradient(90deg, #ec4899, #f43f5e); }
  .score-row.p2 .score-bar { background: linear-gradient(90deg, #60a5fa, #38bdf8); }

  .score-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 900;
    flex-shrink: 0;
    width: 80px;
    text-align: right;
    line-height: 1;
  }

  .score-row.p1 .score-val { color: #ec4899; }
  .score-row.p2 .score-val { color: #60a5fa; }

  .score-unit {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    text-align: right;
    margin-top: 2px;
  }

  .vs-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0;
  }

  .vs-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

  .vs-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
  }

  .leader-label {
    text-align: center;
    margin-top: 8px;
  }

  .leader-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .leader-badge.p1 { background: rgba(236,72,153,0.15); color: #ec4899; }
  .leader-badge.p2 { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .leader-badge.tie { background: rgba(255,230,109,0.15); color: var(--yellow); }

  /* ---- LOG ---- */
  .log-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 20px;
  }

  .log-card h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 340px;
    overflow-y: auto;
  }

  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    flex-shrink: 0;
  }

  .log-info { flex: 1; min-width: 0; }

  .log-who {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .log-who.p1 { color: #ec4899; }
  .log-who.p2 { color: #60a5fa; }

  .log-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    margin-left: 6px;
  }

  .log-note {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .log-time {
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    flex-shrink: 0;
  }

  .log-delete {
    background: none;
    border: none;
    color: rgba(255,255,255,0.12);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .log-delete:hover { color: rgba(255,107,107,0.7); }

  .empty-log {
    text-align: center;
    padding: 28px 20px;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-log .big { font-size: 32px; display: block; margin-bottom: 8px; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(255,255,255,0.95);
    color: #0f0f1a;
    padding: 12px 22px;
    border-radius: 100px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* confetti */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }
</style>
</head>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

  <div class="header">
    <h1>🥊 БИТВА <br> ШАГОВ </h1>
    <div class="subtitle">кто больше двигается — побеждает</div>
  </div>

  1: document.querySelector('#btn-p1 .fighter-photo').src,
  2: document.querySelector('#btn-p2 .fighter-photo').src
};

let currentPlayer = null;
let activeTab = 'steps';
let period = 'today';
let allLogs = [];

window.selectPlayer = function(p) {
  currentPlayer = p;
  document.getElementById('btn-p1').className = 'fighter-btn' + (p===1 ? ' active-p1' : '');
  document.getElementById('btn-p2').className = 'fighter-btn' + (p===2 ? ' active-p2' : '');
  document.getElementById('add-card').classList.remove('locked');
  const btn = document.getElementById('submit-btn');
  btn.className = 'submit-btn p' + p;
};

window.switchTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='steps')||(i===1 && tab==='time'));
  });
  document.getElementById('tab-steps').classList.toggle('visible', tab==='steps');
  document.getElementById('tab-time').classList.toggle('visible', tab==='time');
};

window.selectDur = function(mins) {
  document.getElementById('time-input').value = mins;
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim().startsWith(mins + ' ') || b.textContent.trim() === mins + ' мин');
  });
};

window.addQuick = function(val) {
  const inp = document.getElementById('steps-input');
  inp.value = parseInt(inp.value||0) + val;
};

window.submitActivity = async function() {
  if (!currentPlayer) return;
  let value, unit, note;
  if (activeTab === 'steps') {
    value = parseInt(document.getElementById('steps-input').value);
    unit = 'steps';
    note = document.getElementById('steps-note').value.trim();
    if (!value || value < 1) { showToast('Введи количество шагов! 👟'); return; }
  } else {
    value = parseInt(document.getElementById('time-input').value);
    unit = 'minutes';
    note = document.getElementById('time-note').value.trim();
    if (!value || value < 1) { showToast('Укажи время активности! ⏱'); return; }
  }

  const btn = document.getElementById('submit-btn');
  btn.textContent = '⏳ СОХРАНЯЕМ…';
  btn.style.opacity = '0.6';

  try {
    await addDoc(collection(db, 'steps_battle'), {
      player: currentPlayer, value, unit, note, ts: serverTimestamp()
    });
    document.getElementById('steps-input').value = '';
    document.getElementById('steps-note').value = '';
    document.getElementById('time-input').value = '';
    document.getElementById('time-note').value = '';
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('selected'));
    const msg = unit === 'steps'
      ? `+${value.toLocaleString('ru')} шагов! 🥊`
      : `+${value} мин активности! 💪`;
    showToast(msg);
    confettiBurst(currentPlayer);
  } catch(e) {
    showToast('Ошибка сохранения 😢');
    console.error(e);
  }

  btn.textContent = 'ЗАПИСАТЬ';
  btn.style.opacity = '1';
};

window.setPeriod = function(p) {
  period = p;
  ['today','week','all'].forEach(k => {
    document.getElementById('pb-' + k).classList.toggle('active', k===p);
  });
  updateScoreUI();
};

const q = query(collection(db, 'steps_battle'), orderBy('ts', 'desc'));
onSnapshot(q, snap => {
  allLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  updateScoreUI();
  renderLog();
});

function filterByPeriod(logs) {
  const now = new Date();
  return logs.filter(l => {
    if (!l.ts) return true;
    const d = l.ts.toDate ? l.ts.toDate() : new Date(l.ts);
    if (period === 'today') return d.toDateString() === now.toDateString();
    if (period === 'week') {
      const mon = new Date(now);
      mon.setDate(now.getDate() - ((now.getDay()+6)%7));
      mon.setHours(0,0,0,0);
      return d >= mon;
    }
    return true;
  });
}

function calcScore(player) {
  const f = filterByPeriod(allLogs).filter(l => l.player === player);
  return {
    steps: f.filter(l=>l.unit==='steps').reduce((s,l)=>s+(l.value||0),0),
    mins:  f.filter(l=>l.unit==='minutes').reduce((s,l)=>s+(l.value||0),0)
  };
}

function updateScoreUI() {
  const s1 = calcScore(1), s2 = calcScore(2);
  const hasSteps = (s1.steps + s2.steps) > 0;
  const v1 = hasSteps ? s1.steps : s1.mins;
  const v2 = hasSteps ? s2.steps : s2.mins;
  const unit = hasSteps ? 'шагов' : 'мин';
  const total = v1 + v2;

  document.getElementById('score-v1').textContent = v1.toLocaleString('ru');
  document.getElementById('score-v2').textContent = v2.toLocaleString('ru');
  document.getElementById('score-u1').textContent = unit;
  document.getElementById('score-u2').textContent = unit;

  const pct1 = total > 0 ? Math.round(v1/total*100) : 50;
  const pct2 = 100 - pct1;
  document.getElementById('bar-p1').style.width = pct1 + '%';
  document.getElementById('bar-p2').style.width = pct2 + '%';

  const la = document.getElementById('leader-area');
  if (v1 > v2) la.innerHTML = '<span class="leader-badge p1">🥊 Ирина ведёт!</span>';
  else if (v2 > v1) la.innerHTML = '<span class="leader-badge p2">🥊 Настя ведёт!</span>';
  else if (total > 0) la.innerHTML = '<span class="leader-badge tie">🤝 Полная ничья!</span>';
  else la.innerHTML = '';
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!allLogs.length) {
    el.innerHTML = '<div class="empty-log"><span class="big">👟</span>Пока нет записей.<br>Выбери себя и начинай!</div>';
    return;
  }
  el.innerHTML = allLogs.slice(0,40).map(l => {
    const names = {1:'Ирина', 2:'Настя'};
    const name = names[l.player] || '?';
    const photo = PHOTOS[l.player] || '';
    const timeStr = l.ts ? fmtTime(l.ts.toDate ? l.ts.toDate() : new Date(l.ts)) : '';
    const valStr = l.unit === 'steps'
      ? `${(l.value||0).toLocaleString('ru')} шагов`
      : `${l.value||0} мин`;
    return `<div class="log-item">
      <img class="log-avatar" src="${photo}" alt="${name}">
      <div class="log-info">
        <div><span class="log-who p${l.player}">${name}</span><span class="log-val">${valStr}</span></div>
        ${l.note ? `<div class="log-note">${l.note}</div>` : ''}
      </div>
      <span class="log-time">${timeStr}</span>
      <button class="log-delete" onclick="delEntry('${l.id}')" title="Удалить">×</button>
    </div>`;
  }).join('');
}

window.delEntry = async function(id) {
  if (!confirm('Удалить запись?')) return;
  try { await deleteDoc(doc(db,'steps_battle',id)); }
  catch(e) { showToast('Не удалось удалить'); }
};

function fmtTime(d) {
  const now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru', {day:'numeric',month:'short'});
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
};

function confettiBurst(player) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = player===1
    ? ['#ec4899','#f43f5e','#FFE66D','#fff','#f9a8d4']
    : ['#60a5fa','#38bdf8','#FFE66D','#fff','#93c5fd'];
  const pieces = Array.from({length:70}, () => ({
    x: Math.random()*canvas.width, y: -10,
    r: Math.random()*7+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*5,
    vy: Math.random()*3+2,
    angle: Math.random()*Math.PI*2,
    spin: (Math.random()-0.5)*0.25
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*0.5);
      ctx.restore();
      p.x += p.vx; p.y += p.vy;
      p.angle += p.spin; p.vy += 0.06;
    });
    frame++;
    if (frame < 90) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
</script>
